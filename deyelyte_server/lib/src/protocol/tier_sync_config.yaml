# Per-tier feature configuration. Managed via admin panel.
# Seed rows: beta_free=300/1, basic=900/1, pro=300/null.
class: TierSyncConfig
table: tier_sync_configs
fields:
  tier: String          # 'beta_free' | 'basic' | 'pro'
  syncIntervalSeconds: int
  historyMonths: int?   # null = unlimited; N = months back from start of current month
indexes:
  tier_sync_configs_tier_idx:
    fields: tier
    unique: true
