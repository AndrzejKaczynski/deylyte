# Stores third-party integration credentials per user.
# One row per user (userInfoId FK → UserInfo).
# Credentials are nullable — null means the integration is not configured.
class: IntegrationCredentials
table: integration_credentials
fields:
  userInfoId: int
  # Deye inverter cloud API credentials
  deyeUsername: String?
  deyePasswordHash: String?
  deyeAppId: String?
  deyeAppSecret: String?
  deyeDeviceSn: String?
  # Solcast PV forecast API credentials
  solcastApiKey: String?
  solcastSiteId: String?
  # Pstryk energy price / grid tariff token
  pstrykToken: String?
