# HA add-on device record. One row per user (unique per userId).
# deviceId is SHA256(dongle_serial) — raw serial never stored on server.
class: Device
table: devices
fields:
  userId: int                  # FK → serverpod_auth UserInfo.id
  hashedSerial: String         # SHA256(dongle_serial) — unique device identity
  licenseKey: String           # references license_keys.licenseKey
  lastSeenAt: DateTime?        # updated on every telemetry POST
  lastInverterOk: bool         # true if last telemetry had valid inverter state
  syncIntervalSeconds: int?    # server-assigned poll interval; null until first telemetry
  # Inverter model validation:
  #   null     — no model selected yet (user must pick one)
  #   pending  — model selected, waiting for first telemetry to validate
  #   ok       — telemetry passed sanity checks for this model
  #   failed   — telemetry consistently fails checks; user should verify model choice
  modelValidationStatus: String?
  modelValidationAttempts: int  # consecutive failed validation attempts; resets to 0 on ok or new model
  createdAt: DateTime
indexes:
  devices_user_idx:
    fields: userId
    unique: true
  devices_serial_idx:
    fields: hashedSerial
    unique: true
