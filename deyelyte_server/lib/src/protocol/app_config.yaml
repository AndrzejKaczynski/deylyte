# Per-user EMS configuration. One row per user (userInfoId FK → UserInfo).
class: AppConfig
table: app_config
fields:
  userInfoId: int
  # Timestamp from which energy data collection started for this user
  dataGatheringSince: DateTime?
  # EMS control flags
  chargingEnabled: bool
  sellingEnabled: bool
  # true = only sell PV-generated surplus; false = allow grid arbitrage (buy cheap, sell high)
  pvOnlySelling: bool
  # Requested a one-time battery top-up to minSoc before the next dispatch cycle
  topUpRequested: bool
  # Price thresholds (PLN/kWh)
  alwaysChargePriceThreshold: double
  minSellPriceThreshold: double?
  # Battery hardware specs
  batteryCapacityKwh: double?
  batteryCost: double?         # Purchase cost in PLN, used for ROI calculations
  batteryLifecycles: int?      # Total charge/discharge cycles before end-of-life
  minSocPercentage: double?    # Minimum state-of-charge to maintain (0.0–1.0)
  maxDischargeRateKw: double?
  maxChargeRateKw: double?
  # Site / grid
  gridConnectionKw: double?    # Maximum grid import/export limit for the site
  cityName: String?
  latitude: double?
  longitude: double?
  # Pricing
  # Pricing source: 'pstryk' | 'rce' | 'fixed' (default 'pstryk' if null)
  priceSource: String?
  # Fixed rate (used when priceSource = 'fixed')
  fixedBuyRatePln: double?
  fixedSellRatePln: double?
  # VAT rate applied to RCE spot price before adding distribution (default 0.23 = 23%).
  # Not used for Pstryk (price_gross already includes all fees).
  energyVatRate: double?
  # When true: optimizer generates the full schedule but the add-on does NOT
  # send any commands to the inverter. Defaults to true — the user must
  # explicitly disable this to enable live inverter control.
  # Charging/selling flags are preserved so preferences are not lost.
  planningOnly: bool
  # Admin-controlled flag: whether this user may use the Pstryk integration
  pstrykEnabled: bool
  # Display currency for the Flutter UI. Default: 'PLN'.
  currency: String?
  # Selected inverter model for the local SolarmanV5 add-on (FK → InverterModel.modelId).
  # Null until the user picks a model in the Flutter settings.
  inverterModelId: String?
  # ── Baseline snapshot (captured at first live-enable) ──────────────────────
  # Set once when planningOnly transitions true→false for the first time.
  # Used as restore point when reverting to planning mode.
  baselineChargingEnabled: bool?
  baselineSellingEnabled: bool?
  baselineMaxBuyPrice: double?
  baselineMinSellPrice: double?
  baselinePriceSource: String?
