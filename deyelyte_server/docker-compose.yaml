version: '3.7'

services:
  postgres:
    image: postgres:14.1
    ports:
      - '8090:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: deyelyte
      POSTGRES_PASSWORD: "g-hL2a135MY_M7yqbHAKjsf0rZFikrGr"
    volumes:
      - deyelyte_data:/var/lib/postgresql/data
  redis:
    image: redis:6.2.6
    ports:
      - '8091:6379'
    command: redis-server --requirepass "fr-0_j5ClIMpnGQLAcM_panZr9icwqbP"
    environment:
      - REDIS_REPLICATION_MODE=master
volumes:
  deyelyte_data:
