name: deyelyte_flutter
description: A new Flutter project with Serverpod.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.7.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  serverpod_flutter: 3.4.4
  deyelyte_client:
    path: ../deyelyte_client

  cupertino_icons: ^1.0.5
  serverpod_auth_email_flutter: 3.4.4
  serverpod_auth_shared_flutter: 3.4.4
  google_fonts: ^6.0.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  http: ^1.2.0
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

# Force newer versions of transitive deps from serverpod_auth that are
# incompatible with Dart 3.11 / Flutter 3.32
dependency_overrides:
  cached_network_image: ^3.4.1
  cached_network_image_platform_interface: ^4.1.1
  cached_network_image_web: ^1.3.1
  flutter_blurhash: ^0.9.1
  archive: ^4.0.0

flutter:
  uses-material-design: true
